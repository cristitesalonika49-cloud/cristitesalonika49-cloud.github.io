<!DOCTYPE html>
<html>
<head>
    <title>Cristi Tesalonika</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom right, #87CEEB, #ffffff);
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeUp 1s ease forwards;
        }

        img {
            width: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 1.5s ease forwards;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 22px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #333;
            transform: scale(1.05);
        }

        /* Animations */
        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        /* Click transition overlay */
        .transition {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #87CEEB;
            top: 0;
            left: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .transition.active {
            opacity: 1;
            pointer-events: all;
        }
    </style>
</head>

<body>

<div class="transition" id="transition"></div>

<div class="container">

    <img src="https://via.placeholder.com/120" alt="profile">

    <h1>Cristi Tesalonika</h1>

    <p>UX Designer | Educational Board Game Designer</p>

    <p>Designing meaningful learning experiences through play</p>

    <a class="btn" href="home.html" onclick="goToPage(event)">Explore My Work</a>

</div>

<script>
function goToPage(e) {
    e.preventDefault();
    document.getElementById("transition").classList.add("active");

    setTimeout(() => {
        window.location.href = "home.html";
    }, 500);
}
</script>

</body>
</html>
